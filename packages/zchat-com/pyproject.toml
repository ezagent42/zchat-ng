[project]
name = "zchat-com"
version = "0.0.6.3"
description = "ZChat communication layer"
requires-python = ">=3.12"
dependencies = ["zchat-protocol", "zchat-cli"]

[tool.uv.sources]
zchat-protocol = { workspace = true }
zchat-cli = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zchat_com"]
